# Set the prefix key to Control + a
unbind-key C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# Mouse support
set -g mouse on

# New panes should open in the same path as the current pane
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# New windows should open in the same path as the current pane
bind c new-window -c "#{pane_current_path}"

# Pane border styling
# Source - https://superuser.com/a/1877683
# Posted by maniacalrobot, Retrieved 2026-02-18, License - CC BY-SA 4.0
set-option -g pane-border-lines single
set -g pane-active-border-style "fg=black,bg=yellow"

# Plugins (TPM)
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'christoomey/vim-tmux-navigator'

set -g @continuum-restore 'on'
set -g @resurrect-capture-pane-contents 'on'

# Initialize TPM (must be last line)
run '~/.tmux/plugins/tpm/tpm'
